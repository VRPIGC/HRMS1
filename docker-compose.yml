version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hrms_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: hrms_user
      POSTGRES_PASSWORD: hrms_pass
      POSTGRES_DB: hrms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hrms_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    container_name: hrms_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      DATABASE_URL: postgresql://hrms_user:hrms_pass@postgres:5432/hrms_db
      REDIS_URL: redis://redis:6379
      PORT: 5000
      NODE_ENV: development
      JWT_SECRET: your-super-secret-jwt-key-min-32-chars
      JWT_REFRESH_SECRET: your-refresh-secret-key-min-32-chars
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: hrms_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_WS_URL: ws://localhost:5000
      VITE_APP_NAME: HRMS Platform
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

