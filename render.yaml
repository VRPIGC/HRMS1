databases:
  - name: hrms-db
    plan: free
    databaseName: hrms_db
    user: hrms_user
    region: oregon

services:
  - type: web
    name: hrms-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run seed && npx tsc -p tsconfig.json
    startCommand: node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: FRONTEND_URL
        value: "https://hrms-ashy-three.vercel.app,https://hrmsvrpigroup.com"
      - key: SUPER_ADMIN_EMAIL
        value: "sandeepkumar.pikili@vrpigroup.co.in"
      - key: SUPER_ADMIN_PASSWORD
        value: "Sandeep@VRPI"
